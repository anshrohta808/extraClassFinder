    <style>
      :root {
        --bg: #FFFFFF;
        --accent: #FFFF00; /* Neo Yellow */
        --accent-2: #00FFFF; /* Neo Cyan */
        --accent-3: #FF00FF; /* Neo Pink */
        --black: #000000;
        --white: #FFFFFF;
        
        --border-width: 3px;
        --shadow-offset: 6px;
        --shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--black);
        
        --font-display: 'Space Grotesk', sans-serif;
        --font-body: 'Plus Jakarta Sans', sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg);
        color: var(--black);
        font-family: var(--font-body);
        line-height: 1.2;
        min-height: 100vh;
        overflow-x: hidden;
        background-image: 
          radial-gradient(var(--black) 1px, transparent 1px);
        background-size: 32px 32px;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 60px 24px;
        position: relative;
      }

      /* BRUTAL HEADER */
      .header {
        margin-bottom: 60px;
        text-align: left;
      }

      .header-title {
        font-family: var(--font-display);
        font-size: clamp(48px, 10vw, 96px);
        font-weight: 700;
        text-transform: uppercase;
        line-height: 0.85;
        letter-spacing: -0.05em;
        background: var(--accent);
        display: inline-block;
        padding: 10px 20px;
        border: var(--border-width) solid var(--black);
        box-shadow: var(--shadow);
        transform: rotate(-1deg);
      }

      .header-title span {
        display: block;
        font-size: 0.4em;
        letter-spacing: 0.2em;
        margin-top: 10px;
        background: var(--white);
        padding: 4px 10px;
        border: var(--border-width) solid var(--black);
        width: fit-content;
      }

      /* BENTO PANELS */
      .dashboard-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 30px;
        margin-bottom: 60px;
      }

      @media (max-width: 860px) {
        .dashboard-grid { grid-template-columns: 1fr; }
      }

      .panel {
        background: var(--white);
        border: var(--border-width) solid var(--black);
        padding: 40px;
        box-shadow: var(--shadow);
        position: relative;
      }

      .panel-yellow { background: var(--accent); }
      .panel-cyan { background: var(--accent-2); }

      .panel-label {
        font-family: var(--font-display);
        font-size: 24px;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 24px;
        display: block;
        background: var(--white);
        border: var(--border-width) solid var(--black);
        padding: 4px 12px;
        width: fit-content;
        box-shadow: 4px 4px 0 var(--black);
      }

      /* BRUTAL CONTROLS */
      .select-field {
        width: 100%;
        background: var(--white);
        border: var(--border-width) solid var(--black);
        color: var(--black);
        padding: 16px;
        font-family: inherit;
        font-size: 18px;
        font-weight: 800;
        outline: none;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--black);
        transition: transform 0.1s;
      }

      .select-field:active {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--black);
      }

      .day-selector {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }

      .day-btn {
        background: var(--white);
        border: var(--border-width) solid var(--black);
        color: var(--black);
        padding: 15px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--black);
        transition: all 0.1s;
      }

      .day-btn:hover {
        background: var(--accent-3);
        color: var(--white);
      }

      .day-btn.active {
        background: var(--black);
        color: var(--white);
        transform: translate(4px, 4px);
        box-shadow: 0 0 0 var(--black);
      }

      /* RESULTS AREA */
      .results-area {
        margin-top: 60px;
      }

      .status-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 40px;
        background: var(--black);
        color: var(--white);
        padding: 20px 30px;
        border: var(--border-width) solid var(--black);
        box-shadow: var(--shadow);
      }

      .status-title {
        font-family: var(--font-display);
        font-size: 32px;
        text-transform: uppercase;
      }

      .status-count {
        font-size: 18px;
        font-weight: 800;
        background: var(--accent);
        color: var(--black);
        padding: 4px 15px;
        border: var(--border-width) solid var(--black);
      }

      /* SLOT CARDS */
      .slot-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .slot-card {
        background: var(--white);
        border: var(--border-width) solid var(--black);
        padding: 0;
        display: flex;
        box-shadow: var(--shadow);
        transition: transform 0.2s;
        min-height: 140px;
      }

      .slot-card:hover {
        transform: translate(-4px, -4px);
        box-shadow: 10px 10px 0 var(--black);
      }

      .slot-sidebar {
        flex: 0 0 120px;
        background: var(--accent-2);
        border-right: var(--border-width) solid var(--black);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
      }

      .type-tag {
        font-size: 12px;
        font-weight: 900;
        background: var(--black);
        color: var(--white);
        padding: 4px 8px;
        margin-bottom: 10px;
        text-transform: uppercase;
      }

      .time-display {
        font-size: 16px;
        font-weight: 800;
        line-height: 1.1;
      }

      .slot-content {
        flex: 1;
        padding: 30px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .batch-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 20px;
      }

      .batch-chip {
        background: var(--white);
        border: 2px solid var(--black);
        padding: 4px 12px;
        font-size: 13px;
        font-weight: 800;
      }

      .meta-grid {
        display: flex;
        gap: 50px;
      }

      .meta-item {
        display: flex;
        flex-direction: column;
      }

      .meta-label {
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
        color: rgba(0,0,0,0.5);
      }

      .meta-value {
        font-size: 18px;
        font-weight: 800;
      }

      /* EMPTY STATE */
      .empty-state {
        border: var(--border-width) dashed var(--black);
        padding: 80px 40px;
        text-align: center;
        background: var(--white);
      }

      .empty-title {
        font-family: var(--font-display);
        font-size: 36px;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .empty-desc {
        font-size: 18px;
        font-weight: 700;
        max-width: 400px;
        margin: 0 auto;
      }

      /* FOOTER */
      .footer {
        margin-top: 100px;
        padding: 40px;
        border: var(--border-width) solid var(--black);
        background: var(--black);
        color: var(--white);
        display: flex;
        justify-content: space-between;
        font-weight: 800;
        text-transform: uppercase;
        font-size: 14px;
      }

      @media (max-width: 640px) {
        .slot-card { flex-direction: column; }
        .slot-sidebar { flex: none; border-right: none; border-bottom: var(--border-width) solid var(--black); width: 100%; flex-direction: row; gap: 20px; }
        .meta-grid { flex-direction: column; gap: 20px; }
      }
    </style>
  </head>

      // --- helpers ---
      function timeToMinutes(t) {
        const m = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
        if (!m) return 0;
        let h = parseInt(m[1]),
          min = parseInt(m[2]);
        if (m[3].toUpperCase() === "PM" && h !== 12) h += 12;
        if (m[3].toUpperCase() === "AM" && h === 12) h = 0;
        return h * 60 + min;
      }

      function consolidateSlots(entries) {
        const groups = {};
        for (const e of entries) {
          const bKey = [...e.batches].sort().join(",");
          const key = `${bKey}|${e.faculty}|${e.room}|${e.type}`;
          if (!groups[key])
            groups[key] = { ...e, batches: [...e.batches], times: [e.time] };
          else groups[key].times.push(e.time);
        }
        return Object.values(groups)
          .map((g) => {
            g.times.sort(
              (a, b) =>
                timeToMinutes(a.split(" - ")[0]) -
                timeToMinutes(b.split(" - ")[0]),
            );
            const first = g.times[0].split(" - ")[0].trim();
            const last = g.times[g.times.length - 1].split(" - ")[1].trim();
            return { ...g, displayTime: `${first} - ${last}` };
          })
          .sort(
            (a, b) =>
              timeToMinutes(a.displayTime.split(" - ")[0]) -
              timeToMinutes(b.displayTime.split(" - ")[0]),
          );
      }

      // --- state ---
      let selectedCourse = "",
        selectedDay = "";

      // --- init selects ---
      const sel = document.getElementById("courseSelect");
      Object.entries(COURSES).forEach(([code, name]) => {
        const opt = document.createElement("option");
        opt.value = code;
        opt.textContent = `[${code}] ${name}`;
        sel.appendChild(opt);
      });
      sel.addEventListener("change", (e) => {
        selectedCourse = e.target.value;
        render();
      });

      // --- day buttons ---
      const dayGrid = document.getElementById("dayGrid");
      DAYS.forEach((d) => {
        const btn = document.createElement("button");
        btn.className = "day-btn";
        btn.textContent = d;
        btn.onclick = () => {
          selectedDay = d;
          document
            .querySelectorAll(".day-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          render();
        };
        dayGrid.appendChild(btn);
      });

      // --- render ---
                  function render() {
        const resultsArea = document.getElementById("resultsArea");
        if (!selectedCourse || !selectedDay) {
          resultsArea.innerHTML = `
            <div class="empty-state">
              <h3 class="empty-title">System Idle</h3>
              <p class="empty-desc">SELECT A COURSE AND DAY TO INITIATE SCHEDULE ANALYSIS.</p>
            </div>`;
          return;
        }
        
        const key = `${selectedDay}|${selectedCourse}`;
        const raw = TT_DATA[key];
        
        if (!raw || raw.length === 0) {
          resultsArea.innerHTML = `
            <div class="status-header">
              <h2 class="status-title">${DAY_FULL[selectedDay]}</h2>
              <div class="status-count" style="background: var(--accent-2);">NO CONFLICTS DETECTED</div>
            </div>
            <div class="empty-state">
              <h3 class="empty-title">Clear Path</h3>
              <p class="empty-desc">No schedule overlaps for ${DAY_FULL[selectedDay]}. Proceed with scheduling.</p>
            </div>`;
          return;
        }

        const slots = consolidateSlots(raw);
        let htmlContent = `
          <div class="status-header">
            <h2 class="status-title">${DAY_FULL[selectedDay]}</h2>
            <div class="status-count">${slots.length} SLOTS OCCUPIED</div>
          </div>
          <div class="slot-list">`;

        slots.forEach((r, i) => {
          const tm = TYPE_MAP[r.type] || { code: "L", label: "LECTURE" };
          const batchNodes = r.batches
            .map((b) => `<span class="batch-chip">${b}</span>`)
            .join("");
            
          htmlContent += `
            <div class="slot-card">
              <div class="slot-sidebar" style="background: ${tm.code === 'L' ? 'var(--accent)' : tm.code === 'T' ? 'var(--accent-2)' : 'var(--accent-3)'}">
                <span class="type-tag">${tm.label}</span>
                <div class="time-display">${r.displayTime}</div>
              </div>
              <div class="slot-content">
                <div class="batch-list">${batchNodes}</div>
                <div class="meta-grid">
                  <div class="meta-item">
                    <span class="meta-label">Faculty</span>
                    <span class="meta-value">${r.faculty}</span>
                  </div>
                  <div class="meta-item">
                    <span class="meta-label">Location</span>
                    <span class="meta-value">${r.room}</span>
                  </div>
                </div>
              </div>
            </div>`;
        });

        htmlContent += `</div>`;
        resultsArea.innerHTML = htmlContent;
      }
    </script>
  </body>
</html>
